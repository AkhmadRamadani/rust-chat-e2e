# ── Dev / Preview overlay — adds mock OIDC ────────────────────────────────────
#
# Extends docker-compose.yml with:
#   - mock-oauth2-server  (oidc-server) — issues signed JWTs for local dev
#   - oidc nginx proxy    (oidc)        — rewrites /.well-known/jwks.json path
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# After starting, register the dev tenant:
#   curl -X POST http://localhost:3000/admin/tenants \
#     -H "Authorization: Bearer $ADMIN_TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"name":"Dev Tenant","oidc_issuer":"http://oidc/default"}'
#
# Issue tokens (JWT iss = http://oidc/default):
#   curl -X POST http://localhost:3000/oidc/default/token \
#     -H "Content-Type: application/x-www-form-urlencoded" \
#     -d "grant_type=client_credentials&client_id=alice&client_secret=any"
#
# ── NEVER use this overlay in production ──────────────────────────────────────

services:
  # ── Mock OIDC server (issues JWTs for any client_id) ─────────────────────
  oidc-server:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
    networks:
      - internal

  # ── OIDC nginx proxy ──────────────────────────────────────────────────────
  # Sits on hostname "oidc:80" inside Docker.
  # - Rewrites /{issuer}/.well-known/jwks.json → /{issuer}/jwks
  #   so the API auth layer can fetch JWKS via the standard path.
  # - Forwards tokens with Host: oidc:80 so JWT iss = http://oidc/default.
  # - Exposed on host port 8888 for curl access.
  oidc:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./oidc-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - oidc-server
    networks:
      - internal
      - external

  # ── Client overlay — adds /oidc proxy route ───────────────────────────────
  client:
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./client/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
