server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── WebSocket upgrade → api:8080 ──────────────────────────────────────
    location ^~ /ws {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── REST API routes → api:8080 ────────────────────────────────────────
    location ~ ^/(health|metrics|admin|users|conversations|groups|auth|attachments)(/.*)?$ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Mock OIDC → oidc:80 (DEV ONLY) ───────────────────────────────────
    # Issue tokens: POST /oidc/default/token
    # JWT iss will be http://oidc/default (matches tenant registration)
    location ^~ /oidc/ {
        rewrite ^/oidc/(.*) /$1 break;
        proxy_pass http://oidc:80;
        proxy_set_header Host oidc:80;
    }

    # ── Static client ──────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }
}
