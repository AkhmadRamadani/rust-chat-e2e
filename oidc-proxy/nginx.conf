server {
    listen 80;
    server_name _;

    # Rewrite /{issuer_id}/.well-known/jwks.json → /{issuer_id}/jwks
    location ~ ^(/[^/]+)/\.well-known/jwks\.json$ {
        proxy_pass http://oidc-server:8080$1/jwks;
        proxy_set_header Host oidc:80;
    }

    # Pass everything else through (token endpoint, discovery, etc.)
    location / {
        proxy_pass http://oidc-server:8080;
        proxy_set_header Host oidc:80;
    }
}
