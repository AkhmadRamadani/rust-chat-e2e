# ── rust-e2e-chat-api — production stack ──────────────────────────────────────
#
# Services: postgres, redis, migrate, api, client
#
# Usage (production):
#   cp .env.example .env     # fill in secrets + real OIDC config
#   docker compose up -d
#
# Usage (dev / preview — adds mock OIDC):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Before first run, register your tenant with your real OIDC issuer:
#   curl -X POST http://localhost:8080/admin/tenants \
#     -H "Authorization: Bearer $ADMIN_TOKEN" \
#     -H "Content-Type: application/json" \
#     -d '{"name":"My App","oidc_issuer":"https://your-idp.example.com"}'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatpass}
      POSTGRES_DB: ${POSTGRES_DB:-chatdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatuser} -d ${POSTGRES_DB:-chatdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispass}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "PING"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── Database migrations ──────────────────────────────────────────────────────
  migrate:
    image: postgres:16-alpine
    entrypoint: ["sh", "-c"]
    command:
      - |
        for f in $(ls /migrations/*.sql | sort); do
          echo "Applying $$f ...";
          psql "$$DATABASE_URL" -f "$$f" || exit 1;
        done;
        echo "Migrations done."
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatuser}:${POSTGRES_PASSWORD:-chatpass}@postgres:5432/${POSTGRES_DB:-chatdb}
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  # ── API server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatuser}:${POSTGRES_PASSWORD:-chatpass}@postgres:5432/${POSTGRES_DB:-chatdb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN must be set in .env}
      BIND_ADDR: 0.0.0.0:8080
      ATTACHMENT_DIR: /app/attachments
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - attachments_data:/app/attachments
    ports:
      - "${API_PORT:-8080}:8080/tcp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
      - external

  # ── Next.js Web App ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - internal
      - external

  # ── Dev client (nginx proxy + static HTML fallback) ─────────────────────────
  client:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${CLIENT_PORT:-3000}:80"
    depends_on:
      - api
      - web
    networks:
      - internal
      - external

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  attachments_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
  external:
